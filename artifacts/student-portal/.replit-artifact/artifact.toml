kind = "web"
previewPath = "/"
title = "بوابة الطالب | ASPU Student Portal"
version = "1.0.0"
id = "artifacts/student-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21993

[services.development]
run = "pnpm --filter @workspace/student-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/student-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21993"
BASE_PATH = "/"
