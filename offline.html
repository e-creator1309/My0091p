<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>غير متصل | ASPU</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#f0fdf4;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      direction:rtl;text-align:center;padding:24px;
    }
    .card{background:#fff;border-radius:24px;padding:48px 36px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .icon{font-size:64px;margin-bottom:16px}
    h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
    p{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:28px}
    button{
      background:#16a34a;color:#fff;border:none;
      padding:14px 32px;border-radius:14px;
      font-size:16px;font-weight:600;cursor:pointer;width:100%;
    }
    button:active{background:#15803d}
    .aspu{margin-top:20px;font-size:12px;color:#9ca3af}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تحقق من اتصالك بالإنترنت ثم أعد المحاولة للوصول إلى بوابة الطالب.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
    <p class="aspu">بوابة الطالب — جامعة الشام الخاصة</p>
  </div>
</body>
</html>
